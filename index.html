<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Soluciones y Transformación Digital</title>

  <meta name="description" content="Soluciones y transformación digital para profesionales, negocios y emprendimientos. Diseño web, identidad visual, presencia digital, optimización y contenido visual básico con apoyo digital e inteligencia artificial.">
  <meta name="keywords" content="soluciones digitales, transformación digital, diseño web, presencia digital, identidad visual, páginas web, branding visual, WhatsApp Business, Google Maps">
  <meta name="author" content="Soluciones y Transformación Digital">

  <style>
    :root {
      --azul:#0077b6;
      --azul-claro:#00b4d8;
      --azul-oscuro:#023e8a;
      --turquesa-suave:#e9fbff;
      --borde-azul:#bdeef7;
      --texto:#333333;
      --whatsapp:#25D366;
      --whatsapp-oscuro:#128C7E;
    }

    * { box-sizing:border-box; }

    html { scroll-behavior:smooth; }

    body {
      font-family:Arial, sans-serif;
      margin:0;
      background:#ffffff;
      color:var(--texto);
      line-height:1.6;
    }

    .top-logo{
      text-align:center;
      padding:4px 15px 0;
      background:#ffffff;
    }

    .brand-logo{
      max-width:520px;
      width:90%;
      height:auto;
      display:block;
      margin:0 auto -18px;
      filter:drop-shadow(0 6px 16px rgba(0,119,182,0.10));
    }

    .brand-subtitle{
      color:var(--azul);
      font-size:1rem;
      margin-top:0;
      margin-bottom:6px;
      font-weight:600;
      letter-spacing:0.2px;
    }

    nav {
      background:linear-gradient(90deg,var(--azul-oscuro),var(--azul),var(--azul-claro));
      text-align:center;
      padding:12px 5px;
      position:sticky;
      top:0;
      z-index:100;
    }

    nav a {
      color:#fff;
      text-decoration:none;
      margin:0 8px;
      font-weight:bold;
      padding:8px 12px;
      border-radius:22px;
      display:inline-block;
      transition:all 0.25s ease;
      font-size:0.9rem;
    }

    nav a:hover {
      background:rgba(255,255,255,0.22);
      transform:translateY(-1px);
    }

    .hero {
      background:
        linear-gradient(90deg,rgba(255,255,255,0.94),rgba(255,255,255,0.82),rgba(233,251,255,0.55)),
        radial-gradient(circle at top right, rgba(0,180,216,0.28), transparent 35%),
        linear-gradient(135deg,#ffffff,#e9fbff);
      border-bottom:1px solid var(--borde-azul);
    }

    .hero-content {
      max-width:1250px;
      margin:auto;
      min-height:520px;
      display:grid;
      grid-template-columns:1fr 1fr;
      align-items:center;
      gap:30px;
      padding:42px 50px;
    }

    .hero-text h1 {
      color:var(--azul-oscuro);
      font-size:2.75rem;
      line-height:1.1;
      margin:0 0 18px;
      max-width:650px;
    }

    .hero-text h1 span {
      color:var(--azul-claro);
      display:block;
    }

    .hero-text p {
      color:#1f3d5a;
      font-size:1.08rem;
      max-width:590px;
      margin-bottom:22px;
      text-align:justify;
    }

    .hero-buttons {
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .button,
    .plan-button {
      display:inline-block;
      color:#fff;
      padding:13px 24px;
      border-radius:28px;
      text-decoration:none;
      font-weight:bold;
      margin-top:8px;
      transition:all 0.25s ease;
    }

    .button:hover,
    .plan-button:hover {
      transform:translateY(-2px);
    }

    .whatsapp-button,
    .plan-button {
      background:linear-gradient(90deg,var(--whatsapp-oscuro),var(--whatsapp));
      box-shadow:0 5px 14px rgba(37,211,102,0.32);
    }

    .secondary-button {
      background:linear-gradient(90deg,var(--azul-oscuro),var(--azul),var(--azul-claro));
      box-shadow:0 5px 14px rgba(0,119,182,0.25);
    }

    .plan-button {
      display:block;
      text-align:center;
      margin-top:auto;
      padding:14px 20px;
      border-radius:50px;
      font-weight:800;
      box-shadow:0 8px 20px rgba(37,211,102,0.28);
    }

    .plan-button:hover {
      box-shadow:0 12px 28px rgba(37,211,102,0.38);
    }

    .hero-card {
      background:#ffffff;
      border:1px solid var(--borde-azul);
      border-radius:28px;
      padding:28px;
      box-shadow:0 18px 42px rgba(0,62,138,0.16);
    }

    .hero-card h3 {
      color:var(--azul-oscuro);
      margin:0 0 12px;
      font-size:1.3rem;
    }

    .hero-card ul {
      list-style:none;
      padding:0;
      margin:0;
    }

    .hero-card li {
      padding:10px 0;
      border-bottom:1px solid #eef8fb;
      color:#334;
      font-size:0.95rem;
    }

    .hero-card li::before {
      content:"✓";
      color:var(--azul);
      font-weight:800;
      margin-right:8px;
    }

    main {
      max-width:1120px;
      margin:auto;
      padding:32px 18px;
    }

    section { margin-bottom:48px; }

    h2 {
      color:var(--azul-oscuro);
      border-bottom:2px solid var(--azul);
      padding-bottom:6px;
      font-size:1.55rem;
    }

    .section-title {
      text-align:center;
      color:var(--azul-oscuro);
      font-size:1.45rem;
      margin-bottom:25px;
      font-weight:bold;
    }

    .section-title::before,
    .section-title::after {
      content:"";
      display:inline-block;
      width:110px;
      height:1px;
      background:var(--azul-claro);
      vertical-align:middle;
      margin:0 18px;
    }

    .intro-box,
    .notice-box {
      background:linear-gradient(180deg,#ffffff,var(--turquesa-suave));
      border:1px solid var(--borde-azul);
      border-radius:18px;
      padding:24px;
      box-shadow:0 8px 22px rgba(0,119,182,0.10);
      text-align:justify;
    }

    .services-grid,
    .plans-grid,
    .process-grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:24px;
      margin-top:22px;
    }

    .plans-grid {
      align-items:stretch;
    }

    .card,
    .plan-card,
    .process-card {
      background:#ffffff;
      border:1px solid #e3f3f8;
      border-radius:18px;
      padding:24px 20px;
      box-shadow:0 6px 18px rgba(0,0,0,0.07);
      transition:all 0.25s ease;
      overflow:hidden;
    }

    .plan-card{
      display:flex;
      flex-direction:column;
    }

    .card:hover,
    .plan-card:hover,
    .process-card:hover {
      transform:translateY(-4px);
      box-shadow:0 12px 26px rgba(0,119,182,0.16);
      border-color:var(--azul-claro);
    }

    .icon {
      width:56px;
      height:56px;
      border-radius:50%;
      background:linear-gradient(90deg,var(--azul-oscuro),var(--azul-claro));
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:1.6rem;
      margin
